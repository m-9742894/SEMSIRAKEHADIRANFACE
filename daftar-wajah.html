<!DOCTYPE html>
<html lang="ms">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
    <title>Daftar Wajah Pelajar - Face Attendance System</title>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    
    <!-- Firebase SDK -->
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore-compat.js"></script>
    
    <!-- Face-api.js -->
    <script src="https://cdn.jsdelivr.net/npm/face-api.js@0.22.2/dist/face-api.min.js"></script>
    
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: 'Plus Jakarta Sans', sans-serif;
            background: linear-gradient(135deg, #0f172a 0%, #1e1b4b 100%);
            min-height: 100vh;
            padding: 20px;
        }
        .container { max-width: 1200px; margin: 0 auto; }
        .header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            flex-wrap: wrap;
            gap: 1rem;
            margin-bottom: 1.5rem;
            padding-bottom: 1rem;
            border-bottom: 2px solid rgba(255,255,255,0.1);
        }
        .logo-area { display: flex; align-items: center; gap: 1rem; }
        .logo-icon {
            background: linear-gradient(135deg, #667eea, #764ba2);
            width: 45px; height: 45px;
            border-radius: 15px;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        .logo-icon i { font-size: 1.5rem; color: white; }
        .logo-text h1 { font-size: 1.2rem; color: white; }
        .logo-text p { font-size: 0.7rem; color: #94a3b8; }
        .nav-buttons { display: flex; gap: 1rem; }
        .nav-btn {
            background: rgba(255,255,255,0.1);
            border: none;
            padding: 0.5rem 1rem;
            border-radius: 40px;
            cursor: pointer;
            font-weight: 600;
            color: #f1f5f9;
            text-decoration: none;
            font-size: 0.8rem;
            display: inline-flex;
            align-items: center;
            gap: 8px;
            transition: 0.2s;
        }
        .nav-btn:hover { background: rgba(255,255,255,0.2); }
        .nav-btn.active { background: #10b981; }
        
        .main-grid {
            display: grid;
            grid-template-columns: 1fr 400px;
            gap: 1.5rem;
        }
        .camera-section {
            background: #1e293b;
            border-radius: 1.5rem;
            overflow: hidden;
            box-shadow: 0 20px 35px -10px rgba(0,0,0,0.3);
        }
        .camera-header {
            background: linear-gradient(135deg, #667eea, #764ba2);
            padding: 0.8rem 1rem;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        .camera-header h3 { color: white; font-size: 0.9rem; }
        .camera-status {
            background: rgba(0,0,0,0.5);
            padding: 0.2rem 0.6rem;
            border-radius: 20px;
            font-size: 0.7rem;
            color: #fbbf24;
        }
        .webcam-wrapper {
            position: relative;
            background: #0f172a;
            min-height: 400px;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        #webcam {
            width: 100%;
            height: auto;
            display: block;
            transform: scaleX(-1);
        }
        #canvas {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
        }
        .camera-controls {
            padding: 1rem;
            display: flex;
            gap: 1rem;
            justify-content: center;
        }
        .btn-cam {
            padding: 0.6rem 1.2rem;
            border-radius: 40px;
            border: none;
            font-weight: 600;
            cursor: pointer;
            transition: 0.2s;
            display: inline-flex;
            align-items: center;
            gap: 8px;
        }
        .btn-start { background: #10b981; color: white; }
        .btn-start:hover { background: #059669; transform: translateY(-2px); }
        .btn-stop { background: #ef4444; color: white; }
        .btn-stop:hover { background: #dc2626; transform: translateY(-2px); }
        .btn-capture { background: #3b82f6; color: white; }
        .btn-capture:hover { background: #2563eb; transform: translateY(-2px); }
        .btn-save { background: #8b5cf6; color: white; width: 100%; margin-top: 1rem; }
        .btn-save:hover { background: #7c3aed; transform: translateY(-2px); }
        .camera-placeholder {
            text-align: center;
            padding: 80px 20px;
            color: #64748b;
        }
        .camera-placeholder i { font-size: 4rem; margin-bottom: 1rem; color: #475569; }
        
        .form-section {
            background: #1e293b;
            border-radius: 1.5rem;
            overflow: hidden;
        }
        .form-header {
            background: #0f172a;
            padding: 1rem;
            border-bottom: 1px solid #334155;
        }
        .form-header h3 { color: white; font-size: 1rem; display: flex; align-items: center; gap: 8px; }
        .form-body { padding: 1.2rem; }
        .form-group { margin-bottom: 1rem; }
        .form-group label {
            display: block;
            font-weight: 600;
            font-size: 0.75rem;
            color: #94a3b8;
            margin-bottom: 0.3rem;
        }
        .form-group input {
            width: 100%;
            padding: 0.8rem;
            border-radius: 12px;
            border: 1px solid #334155;
            background: #0f172a;
            color: white;
            font-size: 0.9rem;
            outline: none;
        }
        .form-group input:focus { border-color: #667eea; }
        .preview-area {
            background: #0f172a;
            border-radius: 1rem;
            padding: 1rem;
            margin-top: 1rem;
            text-align: center;
        }
        .preview-area p { color: #64748b; font-size: 0.7rem; margin-top: 0.5rem; }
        #facePreview { font-size: 0.8rem; color: #10b981; }
        .message {
            padding: 0.8rem;
            border-radius: 12px;
            margin-top: 1rem;
            display: none;
        }
        .message.success { background: #064e3b; color: #10b981; display: block; }
        .message.error { background: #450a0a; color: #ef4444; display: block; }
        .message.warning { background: #451a03; color: #f59e0b; display: block; }
        .student-list {
            max-height: 300px;
            overflow-y: auto;
            margin-top: 1rem;
        }
        .student-item {
            background: #0f172a;
            border-radius: 0.8rem;
            padding: 0.6rem;
            margin-bottom: 0.5rem;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        .student-info { font-size: 0.75rem; color: white; }
        .student-info small { color: #64748b; }
        .delete-btn {
            background: none;
            border: none;
            color: #ef4444;
            cursor: pointer;
            font-size: 1rem;
        }
        .delete-btn:hover { color: #dc2626; }
        .debug-panel {
            background: #0f172a;
            border-radius: 1rem;
            padding: 0.8rem;
            margin-top: 1rem;
            font-size: 0.7rem;
            color: #94a3b8;
        }
        .debug-panel pre {
            color: #10b981;
            font-family: monospace;
            font-size: 0.65rem;
            margin-top: 0.5rem;
            white-space: pre-wrap;
        }
        @media (max-width: 900px) { .main-grid { grid-template-columns: 1fr; } }
    </style>
</head>
<body>
<div class="container">
    <div class="header">
        <div class="logo-area">
            <div class="logo-icon"><i class="fas fa-user-plus"></i></div>
            <div class="logo-text">
                <h1>Daftar Wajah Pelajar</h1>
                <p>Pendaftaran wajah untuk sistem kehadiran</p>
            </div>
        </div>
        <div class="nav-buttons">
            <a href="scan-muka.html" class="nav-btn"><i class="fas fa-camera"></i> Scan Kehadiran</a>
            <a href="daftar-wajah.html" class="nav-btn active"><i class="fas fa-user-plus"></i> Daftar Wajah</a>
            <a href="index.html" class="nav-btn"><i class="fas fa-sign-out-alt"></i> Log Keluar</a>
        </div>
    </div>

    <div class="main-grid">
        <!-- Camera Section -->
        <div class="camera-section">
            <div class="camera-header">
                <h3><i class="fas fa-video"></i> Tangkap Wajah</h3>
                <div class="camera-status" id="cameraStatus">● Sedia</div>
            </div>
            <div class="webcam-wrapper">
                <video id="webcam" autoplay playsinline muted style="display: none;"></video>
                <canvas id="canvas" style="display: none;"></canvas>
            </div>
            <div class="camera-controls">
                <button class="btn-cam btn-start" id="startCameraBtn">
                    <i class="fas fa-play"></i> Aktifkan Kamera
                </button>
                <button class="btn-cam btn-capture" id="captureBtn" disabled>
                    <i class="fas fa-camera"></i> Tangkap Wajah
                </button>
                <button class="btn-cam btn-stop" id="stopCameraBtn" disabled>
                    <i class="fas fa-stop"></i> Stop Kamera
                </button>
            </div>
            <div class="debug-panel">
                <i class="fas fa-bug"></i> Status Sistem:
                <pre id="debugInfo">Menunggu inisialisasi...</pre>
            </div>
        </div>

        <!-- Form Section -->
        <div class="form-section">
            <div class="form-header">
                <h3><i class="fas fa-edit"></i> Maklumat Pelajar</h3>
            </div>
            <div class="form-body">
                <div class="form-group">
                    <label><i class="fas fa-user"></i> Nama Penuh</label>
                    <input type="text" id="studentName" placeholder="cth: AHMAD BIN ALI">
                </div>
                <div class="form-group">
                    <label><i class="fas fa-id-card"></i> No. Kad Pengenalan</label>
                    <input type="text" id="studentIC" placeholder="cth: 050101011234">
                </div>
                <div class="form-group">
                    <label><i class="fas fa-school"></i> Kelas</label>
                    <input type="text" id="studentClass" placeholder="cth: 5 Cemerlang">
                </div>
                
                <div class="preview-area">
                    <i class="fas fa-face-smile" style="font-size: 2rem; color: #667eea;"></i>
                    <p id="facePreview">Belum ada wajah ditangkap</p>
                </div>
                
                <button class="btn-cam btn-save" id="saveBtn" disabled>
                    <i class="fas fa-save"></i> Simpan ke Firebase
                </button>
                
                <div id="messageBox" class="message"></div>
            </div>
        </div>
    </div>
    
    <!-- Student List Section -->
    <div class="form-section" style="margin-top: 1.5rem;">
        <div class="form-header">
            <h3><i class="fas fa-list"></i> Senarai Pelajar Berdaftar</h3>
        </div>
        <div class="form-body">
            <div id="studentList" class="student-list">
                <p style="color:#64748b; text-align:center;">Memuatkan data...</p>
            </div>
        </div>
    </div>
</div>

<script>
    // ==================== FIREBASE CONFIGURATION ====================
    const firebaseConfig = {
        apiKey: "AIzaSyArA_ctzB3gbM30gPYF58ZP08eFeyepzeE",
        authDomain: "facerecognitionsemsira.firebaseapp.com",
        projectId: "facerecognitionsemsira",
        storageBucket: "facerecognitionsemsira.firebasestorage.app",
        messagingSenderId: "934676262199",
        appId: "1:934676262199:web:3a2fb4de33078f08683eb2",
        measurementId: "G-12PD20V80S"
    };

    // Initialize Firebase
    firebase.initializeApp(firebaseConfig);
    const db = firebase.firestore();
    console.log("Firebase initialized");

    // ==================== DOM ELEMENTS ====================
    const video = document.getElementById('webcam');
    const canvas = document.getElementById('canvas');
    const context = canvas.getContext('2d');
    const startBtn = document.getElementById('startCameraBtn');
    const captureBtn = document.getElementById('captureBtn');
    const stopBtn = document.getElementById('stopCameraBtn');
    const saveBtn = document.getElementById('saveBtn');
    const cameraStatus = document.getElementById('cameraStatus');
    const studentName = document.getElementById('studentName');
    const studentIC = document.getElementById('studentIC');
    const studentClass = document.getElementById('studentClass');
    const facePreview = document.getElementById('facePreview');
    const messageBox = document.getElementById('messageBox');
    const studentListDiv = document.getElementById('studentList');
    const debugInfo = document.getElementById('debugInfo');

    // ==================== VARIABLES ====================
    let modelsLoaded = false;
    let stream = null;
    let currentDescriptor = null;
    let animationId = null;

    // ==================== UPDATE DEBUG ====================
    function updateDebug(message) {
        const time = new Date().toLocaleTimeString();
        debugInfo.innerHTML = `[${time}] ${message}\n` + debugInfo.innerHTML;
        if (debugInfo.innerHTML.split('\n').length > 8) {
            debugInfo.innerHTML = debugInfo.innerHTML.split('\n').slice(0, 8).join('\n');
        }
        console.log(message);
    }

    // ==================== SHOW MESSAGE ====================
    function showMessage(msg, type) {
        messageBox.className = `message ${type}`;
        messageBox.innerHTML = `<i class="fas ${type === 'success' ? 'fa-check-circle' : type === 'error' ? 'fa-exclamation-circle' : 'fa-info-circle'}"></i> ${msg}`;
        setTimeout(() => {
            messageBox.className = 'message';
            messageBox.innerHTML = '';
        }, 4000);
    }

    // ==================== LOAD FACE-API MODELS ====================
    async function loadModels() {
        cameraStatus.innerHTML = '⏳ Memuatkan model...';
        updateDebug("🔄 Memuatkan model face-api.js...");
        
        try {
            const MODEL_URL = 'https://cdn.jsdelivr.net/npm/face-api.js@0.22.2/weights';
            
            await Promise.all([
                faceapi.nets.ssdMobilenetv1.loadFromUri(MODEL_URL),
                faceapi.nets.faceLandmark68Net.loadFromUri(MODEL_URL),
                faceapi.nets.faceRecognitionNet.loadFromUri(MODEL_URL)
            ]);
            
            modelsLoaded = true;
            cameraStatus.innerHTML = '✅ Model sedia';
            updateDebug("✅ Model face-api.js berjaya dimuatkan!");
            
            // Enable capture button if camera is active
            if (video.srcObject && video.paused === false) {
                captureBtn.disabled = false;
            }
            
        } catch (error) {
            console.error("Error loading models:", error);
            cameraStatus.innerHTML = '❌ Model gagal';
            updateDebug(`❌ Gagal muat model: ${error.message}`);
        }
    }

    // ==================== START CAMERA ====================
    async function startCamera() {
        updateDebug("🔄 Meminta akses kamera...");
        
        try {
            // Request camera permission
            stream = await navigator.mediaDevices.getUserMedia({
                video: { 
                    width: { ideal: 640 }, 
                    height: { ideal: 480 }, 
                    facingMode: "user" 
                }
            });
            
            video.srcObject = stream;
            video.style.display = "block";
            canvas.style.display = "block";
            
            await new Promise((resolve) => {
                video.onloadedmetadata = () => {
                    video.play();
                    resolve();
                };
            });
            
            // Set canvas dimensions
            canvas.width = video.videoWidth;
            canvas.height = video.videoHeight;
            
            cameraStatus.innerHTML = '📷 Kamera aktif';
            updateDebug(`✅ Kamera aktif! Resolusi: ${video.videoWidth}x${video.videoHeight}`);
            
            // Enable buttons
            captureBtn.disabled = false;
            stopBtn.disabled = false;
            startBtn.disabled = true;
            
            if (modelsLoaded) {
                startDetectionLoop();
            } else {
                updateDebug("⏳ Menunggu model selesai dimuat...");
                // Wait for models to load
                const checkModels = setInterval(() => {
                    if (modelsLoaded) {
                        clearInterval(checkModels);
                        startDetectionLoop();
                    }
                }, 500);
            }
        } catch (error) {
            console.error("Camera error:", error);
            cameraStatus.innerHTML = '❌ Kamera gagal';
            updateDebug(`❌ Kamera gagal: ${error.message}`);
            
            if (error.name === 'NotAllowedError') {
                alert("❌ Akses kamera ditolak. Sila benarkan akses kamera dalam penyemak imbas anda.");
                showMessage("Akses kamera ditolak. Sila benarkan akses kamera.", "error");
            } else if (error.name === 'NotFoundError') {
                alert("❌ Tiada kamera dikesan. Pastikan peranti anda mempunyai kamera.");
                showMessage("Tiada kamera dikesan.", "error");
            } else {
                alert("❌ Gagal mengakses kamera. Sila cuba lagi.");
                showMessage("Gagal mengakses kamera. Sila cuba lagi.", "error");
            }
        }
    }

    // ==================== STOP CAMERA ====================
    function stopCamera() {
        if (stream) {
            stream.getTracks().forEach(track => track.stop());
            stream = null;
        }
        video.srcObject = null;
        video.style.display = "none";
        canvas.style.display = "none";
        cameraStatus.innerHTML = '● Kamera dihentikan';
        updateDebug("⏹️ Kamera dihentikan");
        
        // Reset buttons
        startBtn.disabled = false;
        captureBtn.disabled = true;
        stopBtn.disabled = true;
        
        if (animationId) {
            cancelAnimationFrame(animationId);
            animationId = null;
        }
        if (context) {
            context.clearRect(0, 0, canvas.width, canvas.height);
        }
    }

    // ==================== DETECTION LOOP ====================
    async function startDetectionLoop() {
        if (!modelsLoaded || !video.srcObject || video.paused) {
            animationId = requestAnimationFrame(() => startDetectionLoop());
            return;
        }
        
        const displaySize = { width: video.videoWidth, height: video.videoHeight };
        
        if (displaySize.width === 0 || displaySize.height === 0) {
            animationId = requestAnimationFrame(() => startDetectionLoop());
            return;
        }
        
        faceapi.matchDimensions(canvas, displaySize);
        
        async function detect() {
            if (!video.srcObject || video.paused || video.ended) {
                animationId = requestAnimationFrame(detect);
                return;
            }
            
            try {
                const detections = await faceapi.detectAllFaces(video)
                    .withFaceLandmarks()
                    .withFaceDescriptors();
                
                const resizedDetections = faceapi.resizeResults(detections, displaySize);
                
                context.clearRect(0, 0, canvas.width, canvas.height);
                
                if (resizedDetections.length > 0) {
                    faceapi.draw.drawDetections(canvas, resizedDetections);
                    faceapi.draw.drawFaceLandmarks(canvas, resizedDetections);
                }
            } catch (e) {
                console.error("Detection error:", e);
            }
            
            animationId = requestAnimationFrame(detect);
        }
        
        detect();
    }

    // ==================== CAPTURE FACE ====================
    async function captureFace() {
        updateDebug("📸 Mencuba menangkap wajah...");
        
        if (!modelsLoaded) {
            showMessage("Model belum sedia. Sila tunggu sebentar.", "error");
            updateDebug("❌ Model belum sedia");
            return;
        }
        
        if (!video.srcObject || video.paused) {
            showMessage("Kamera belum aktif. Sila start camera dahulu.", "error");
            updateDebug("❌ Kamera belum aktif");
            return;
        }
        
        const detection = await faceapi.detectSingleFace(video)
            .withFaceLandmarks()
            .withFaceDescriptor();
        
        if (detection && detection.descriptor) {
            currentDescriptor = Array.from(detection.descriptor);
            
            // Draw capture effect
            const displaySize = { width: video.videoWidth, height: video.videoHeight };
            const resized = faceapi.resizeResults([detection], displaySize);
            context.strokeStyle = '#10b981';
            context.lineWidth = 5;
            context.strokeRect(resized[0].detection.box.x, resized[0].detection.box.y, 
                              resized[0].detection.box.width, resized[0].detection.box.height);
            
            facePreview.innerHTML = '✅ Wajah berjaya ditangkap! Sila simpan.';
            facePreview.style.color = '#10b981';
            saveBtn.disabled = false;
            showMessage("Wajah berjaya ditangkap. Sila lengkapkan maklumat dan simpan.", "success");
            updateDebug(`✅ Wajah berjaya ditangkap! Descriptor length: ${currentDescriptor.length}`);
        } else {
            facePreview.innerHTML = '❌ Tiada wajah dikesan. Pastikan muka jelas kelihatan.';
            facePreview.style.color = '#ef4444';
            currentDescriptor = null;
            saveBtn.disabled = true;
            showMessage("Tiada wajah dikesan. Cuba lagi.", "error");
            updateDebug("❌ Tiada wajah dikesan");
        }
    }

    // ==================== SAVE TO FIRESTORE ====================
    async function saveToFirestore() {
        const name = studentName.value.trim();
        const ic = studentIC.value.trim();
        const className = studentClass.value.trim();
        
        if (!name) { showMessage("Sila masukkan Nama Penuh", "error"); return; }
        if (!ic) { showMessage("Sila masukkan No. Kad Pengenalan", "error"); return; }
        if (!className) { showMessage("Sila masukkan Kelas", "error"); return; }
        if (!currentDescriptor) { showMessage("Sila tangkap wajah terlebih dahulu", "error"); return; }
        
        // Validate IC (12 digits)
        const cleanIc = ic.replace(/-/g, '');
        if (!/^\d{12}$/.test(cleanIc)) {
            showMessage("No. Kad Pengenalan mesti 12 digit nombor", "error");
            return;
        }
        
        // Check if IC already exists
        updateDebug("🔍 Memeriksa IC sudah wujud...");
        const existing = await db.collection('student_faces').where('ic', '==', cleanIc).get();
        if (!existing.empty) {
            showMessage(`❌ No. IC ${cleanIc} sudah wujud untuk ${existing.docs[0].data().name}`, "error");
            return;
        }
        
        showMessage("Menyimpan data ke Firebase...", "warning");
        saveBtn.disabled = true;
        
        try {
            await db.collection('student_faces').add({
                name: name.toUpperCase(),
                ic: cleanIc,
                class: className,
                descriptor: currentDescriptor,
                registeredAt: firebase.firestore.FieldValue.serverTimestamp(),
                status: 'active'
            });
            
            showMessage(`✅ Pelajar ${name.toUpperCase()} berjaya didaftarkan!`, "success");
            updateDebug(`✅ Pelajar ${name.toUpperCase()} disimpan ke Firestore`);
            
            // Reset form
            studentName.value = '';
            studentIC.value = '';
            studentClass.value = '';
            currentDescriptor = null;
            facePreview.innerHTML = 'Belum ada wajah ditangkap';
            facePreview.style.color = '#64748b';
            saveBtn.disabled = true;
            
            // Clear canvas drawing
            context.clearRect(0, 0, canvas.width, canvas.height);
            
            // Refresh list
            loadStudentList();
        } catch (error) {
            console.error("Error saving:", error);
            showMessage(`❌ Gagal menyimpan: ${error.message}`, "error");
            updateDebug(`❌ Gagal simpan: ${error.message}`);
            saveBtn.disabled = false;
        }
    }

    // ==================== LOAD STUDENT LIST ====================
    async function loadStudentList() {
        studentListDiv.innerHTML = '<p style="color:#64748b; text-align:center;">Memuatkan...</p>';
        
        try {
            const snapshot = await db.collection('student_faces').orderBy('registeredAt', 'desc').get();
            
            if (snapshot.empty) {
                studentListDiv.innerHTML = '<p style="color:#64748b; text-align:center;">Tiada pelajar berdaftar</p>';
                return;
            }
            
            let html = '';
            snapshot.forEach(doc => {
                const data = doc.data();
                html += `
                    <div class="student-item">
                        <div class="student-info">
                            <strong>${escapeHtml(data.name)}</strong><br>
                            <small>IC: ${escapeHtml(data.ic)} | Kelas: ${escapeHtml(data.class)}</small>
                        </div>
                        <button class="delete-btn" onclick="deleteStudent('${doc.id}', '${escapeHtml(data.name)}')">
                            <i class="fas fa-trash"></i>
                        </button>
                    </div>
                `;
            });
            studentListDiv.innerHTML = html;
            updateDebug(`📋 ${snapshot.size} pelajar dalam senarai`);
        } catch (error) {
            console.error("Error loading list:", error);
            studentListDiv.innerHTML = '<p style="color:#ef4444; text-align:center;">Gagal memuat data</p>';
            updateDebug(`❌ Gagal muat senarai: ${error.message}`);
        }
    }

    // ==================== DELETE STUDENT ====================
    window.deleteStudent = async function(id, name) {
        if (confirm(`Padam pelajar "${name}"? Tindakan ini tidak boleh dibatalkan.`)) {
            try {
                await db.collection('student_faces').doc(id).delete();
                showMessage(`✅ Pelajar ${name} dipadam`, "success");
                updateDebug(`🗑️ Pelajar ${name} dipadam`);
                loadStudentList();
            } catch (error) {
                showMessage(`❌ Gagal memadam: ${error.message}`, "error");
                updateDebug(`❌ Gagal padam: ${error.message}`);
            }
        }
    };

    // ==================== HELPER FUNCTIONS ====================
    function escapeHtml(str) {
        if (!str) return '';
        return str.replace(/[&<>]/g, m => m === '&' ? '&amp;' : m === '<' ? '&lt;' : '&gt;');
    }

    // ==================== EVENT LISTENERS ====================
    startBtn?.addEventListener('click', startCamera);
    stopBtn?.addEventListener('click', stopCamera);
    captureBtn?.addEventListener('click', captureFace);
    saveBtn?.addEventListener('click', saveToFirestore);

    // ==================== INITIALIZE ====================
    updateDebug("🚀 Memulakan sistem...");
    loadModels();
    loadStudentList();
</script>
</body>
</html>
