
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Face Registration</title>
    <script defer src="https://cdn.jsdelivr.net/npm/face-api.js"></script>
    <link href="https://cdn.jsdelivr.net/npm/tailwindcss@2.2.3/dist/tailwind.min.css" rel="stylesheet">
</head>
<body class="bg-gray-100 flex flex-col items-center p-4">
    <div class="max-w-md w-full bg-white shadow-md rounded p-4">
        <h1 class="text-2xl font-bold text-center mb-4">Register Student Face</h1>
        <div class="mb-4">
            <label for="name" class="block text-sm font-bold mb-2">Full Name:</label>
            <input type="text" id="name" class="w-full p-2 border rounded" placeholder="Enter full name">
        </div>
        <div class="mb-4">
            <label for="class" class="block text-sm font-bold mb-2">Class:</label>
            <input type="text" id="class" class="w-full p-2 border rounded" placeholder="Enter class">
        </div>
        <div class="mb-4">
            <label for="id" class="block text-sm font-bold mb-2">ID Card Number:</label>
            <input type="text" id="id" class="w-full p-2 border rounded" placeholder="Enter ID card number">
        </div>
        <div class="mb-4">
            <video id="video" class="w-full h-full rounded" autoplay muted></video>
        </div>
        <button id="capture" class="w-full bg-blue-500 text-white p-2 rounded">Capture Face</button>
    </div>

    <script>
        const video = document.getElementById('video');
        const captureButton = document.getElementById('capture');

        // Define the function to start the video stream
        async function startVideo() {
            const stream = await navigator.mediaDevices.getUserMedia({ video: true });
            video.srcObject = stream;
        }

        // Load the models from face-api.js
        Promise.all([
            faceapi.nets.tinyFaceDetector.loadFromUri('/models'),
        ]).then(startVideo);

        // Draw a box around the detected face
        video.addEventListener('play', () => {
            const canvas = faceapi.createCanvasFromMedia(video);
            document.body.append(canvas);
            const displaySize = { width: video.offsetWidth, height: video.offsetHeight };
            faceapi.matchDimensions(canvas, displaySize);
            setInterval(async () => {
                const detections = await faceapi.detectAllFaces(video, new faceapi.TinyFaceDetectorOptions());
                canvas.getContext('2d').clearRect(0, 0, canvas.width, canvas.height);
                const resizedDetections = faceapi.resizeResults(detections, displaySize);
                faceapi.draw.drawDetections(canvas, resizedDetections);
            }, 100);
        });

        // Capture the face and save details
        captureButton.addEventListener('click', () => {
            const name = document.getElementById('name').value;
            const studentClass = document.getElementById('class').value;
            const idCard = document.getElementById('id').value;

            if (name && studentClass && idCard) {
                // In a real application, you would save the image of the face along with the data
                const studentData = { name, studentClass, idCard, timestamp: new Date() };
                localStorage.setItem('studentData', JSON.stringify(studentData));
                alert('Student data captured and saved!');
            } else {
                alert('Please fill in all fields.');
            }
        });
    </script>
</body>
</html>
