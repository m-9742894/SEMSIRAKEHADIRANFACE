<!DOCTYPE html>
<html lang="ms">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
    <title>Face Attendance System - Login</title>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Plus Jakarta Sans', sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }

        .container {
            max-width: 450px;
            width: 100%;
            background: white;
            border-radius: 30px;
            padding: 40px;
            box-shadow: 0 25px 50px -12px rgba(0,0,0,0.25);
            text-align: center;
        }

        .logo {
            width: 80px;
            height: 80px;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            border-radius: 25px;
            display: flex;
            align-items: center;
            justify-content: center;
            margin: 0 auto 20px;
        }

        .logo i {
            font-size: 40px;
            color: white;
        }

        h1 {
            font-size: 1.8rem;
            color: #1e293b;
            margin-bottom: 8px;
        }

        .subtitle {
            color: #64748b;
            font-size: 0.85rem;
            margin-bottom: 30px;
        }

        .input-group {
            margin-bottom: 20px;
            text-align: left;
        }

        .input-group label {
            display: block;
            font-weight: 600;
            font-size: 0.8rem;
            color: #1e293b;
            margin-bottom: 8px;
        }

        .input-group label i {
            margin-right: 8px;
            color: #667eea;
        }

        .input-group input {
            width: 100%;
            padding: 14px 16px;
            font-size: 0.95rem;
            font-family: inherit;
            border: 1.5px solid #e2e8f0;
            border-radius: 16px;
            background: #f8fafc;
            transition: all 0.2s;
            outline: none;
        }

        .input-group input:focus {
            border-color: #667eea;
            box-shadow: 0 0 0 3px rgba(102,126,234,0.1);
            background: white;
        }

        .btn-login {
            width: 100%;
            padding: 14px;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            border: none;
            border-radius: 16px;
            font-size: 1rem;
            font-weight: 700;
            cursor: pointer;
            transition: 0.3s;
            margin-top: 10px;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
        }

        .btn-login:hover {
            transform: translateY(-2px);
            box-shadow: 0 10px 20px -5px rgba(102,126,234,0.4);
        }

        .btn-login:disabled {
            opacity: 0.7;
            cursor: not-allowed;
            transform: none;
        }

        .error-message {
            background: #fee2e2;
            color: #dc2626;
            padding: 12px;
            border-radius: 12px;
            font-size: 0.8rem;
            margin-top: 20px;
            display: none;
        }

        .info-box {
            margin-top: 25px;
            padding: 12px;
            background: #f1f5f9;
            border-radius: 12px;
            font-size: 0.7rem;
            color: #64748b;
        }

        .info-box i {
            margin-right: 5px;
            color: #667eea;
        }

        @media (max-width: 500px) {
            .container {
                padding: 30px 25px;
            }
            h1 {
                font-size: 1.5rem;
            }
        }
    </style>
</head>
<body>
<div class="container">
    <div class="logo">
        <i class="fas fa-shield-alt"></i>
    </div>
    <h1>Face Attendance System</h1>
    <div class="subtitle">Sistem Kehadiran Pengecaman Wajah</div>

    <form id="loginForm">
        <div class="input-group">
            <label><i class="fas fa-key"></i> Kode Keselamatan</label>
            <input type="password" id="securityCode" placeholder="Masukkan kode keselamatan" autocomplete="off">
        </div>

        <div class="input-group">
            <label><i class="fas fa-lock"></i> Kata Kunci</label>
            <input type="password" id="password" placeholder="Masukkan kata kunci" autocomplete="off">
        </div>

        <button type="submit" class="btn-login" id="loginBtn">
            <i class="fas fa-arrow-right"></i> Login
        </button>
    </form>

    <div id="errorMessage" class="error-message">
        <i class="fas fa-exclamation-circle"></i> Kode keselamatan atau kata kunci salah!
    </div>

    <div class="info-box">
        <i class="fas fa-info-circle"></i> Akses terhad. Hanya untuk pentadbir sistem.
    </div>
</div>

<!-- Font Awesome Icons -->
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">

<script>
    // Kredensial yang sah
    const VALID_SECURITY_CODE = "Semsira@Jejawi";
    const VALID_PASSWORD = "Semsira@1969";

    const securityCodeInput = document.getElementById('securityCode');
    const passwordInput = document.getElementById('password');
    const loginBtn = document.getElementById('loginBtn');
    const errorMessage = document.getElementById('errorMessage');

    function showError() {
        errorMessage.style.display = 'block';
        setTimeout(() => {
            errorMessage.style.display = 'none';
        }, 3000);
    }

    function clearError() {
        errorMessage.style.display = 'none';
    }

    function validateAndLogin(e) {
        e.preventDefault();
        
        const securityCode = securityCodeInput.value.trim();
        const password = passwordInput.value.trim();

        // Semak kredensial
        if (securityCode === VALID_SECURITY_CODE && password === VALID_PASSWORD) {
            // Login berjaya - simpan session
            sessionStorage.setItem('face_auth', 'true');
            sessionStorage.setItem('face_auth_time', new Date().toISOString());
            
            // Redirect ke halaman scan muka
            window.location.href = 'scan-muka.html';
        } else {
            showError();
            securityCodeInput.value = '';
            passwordInput.value = '';
            securityCodeInput.focus();
        }
    }

    // Event listener untuk form submit
    document.getElementById('loginForm').addEventListener('submit', validateAndLogin);

    // Clear error when user starts typing
    securityCodeInput.addEventListener('input', clearError);
    passwordInput.addEventListener('input', clearError);

    // Check if already logged in (optional)
    if (sessionStorage.getItem('face_auth') === 'true') {
        const authTime = sessionStorage.getItem('face_auth_time');
        if (authTime) {
            const timeDiff = (new Date() - new Date(authTime)) / (1000 * 60); // minutes
            if (timeDiff < 60) { // Less than 60 minutes
                window.location.href = 'scan-muka.html';
            } else {
                sessionStorage.removeItem('face_auth');
                sessionStorage.removeItem('face_auth_time');
            }
        }
    }
</script>
</body>
</html>
