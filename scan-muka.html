<!DOCTYPE html>
<html lang="ms">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
    <title>Face Scan Attendance - Sistem Kehadiran Wajah</title>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Plus Jakarta Sans', sans-serif;
            background: linear-gradient(135deg, #0f172a 0%, #1e1b4b 100%);
            min-height: 100vh;
            padding: 20px;
        }

        .container {
            max-width: 1400px;
            margin: 0 auto;
        }

        /* Header */
        .header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            flex-wrap: wrap;
            gap: 1rem;
            margin-bottom: 1.5rem;
            padding-bottom: 1rem;
            border-bottom: 2px solid rgba(255,255,255,0.1);
        }
        .logo-area {
            display: flex;
            align-items: center;
            gap: 1rem;
        }
        .logo-icon {
            background: linear-gradient(135deg, #667eea, #764ba2);
            width: 45px;
            height: 45px;
            border-radius: 15px;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        .logo-icon i {
            font-size: 1.5rem;
            color: white;
        }
        .logo-text h1 {
            font-size: 1.2rem;
            color: white;
        }
        .logo-text p {
            font-size: 0.7rem;
            color: #94a3b8;
        }
        .logout-btn {
            background: rgba(255,255,255,0.1);
            border: none;
            padding: 0.5rem 1rem;
            border-radius: 40px;
            cursor: pointer;
            font-weight: 600;
            color: #f1f5f9;
            text-decoration: none;
            font-size: 0.8rem;
            display: inline-flex;
            align-items: center;
            gap: 8px;
            transition: 0.2s;
        }
        .logout-btn:hover {
            background: rgba(255,255,255,0.2);
        }

        /* Main Content */
        .main-grid {
            display: grid;
            grid-template-columns: 1fr 400px;
            gap: 1.5rem;
        }

        /* Camera Section */
        .camera-section {
            background: #1e293b;
            border-radius: 1.5rem;
            overflow: hidden;
            position: relative;
            box-shadow: 0 20px 35px -10px rgba(0,0,0,0.3);
        }
        .camera-header {
            background: linear-gradient(135deg, #667eea, #764ba2);
            padding: 0.8rem 1rem;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        .camera-header h3 {
            color: white;
            font-size: 0.9rem;
        }
        .camera-status {
            background: rgba(0,0,0,0.5);
            padding: 0.2rem 0.6rem;
            border-radius: 20px;
            font-size: 0.7rem;
            color: #fbbf24;
        }
        .webcam-wrapper {
            position: relative;
            background: #0f172a;
            min-height: 450px;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        #webcam {
            width: 100%;
            height: auto;
            display: block;
            transform: scaleX(-1);
        }
        #canvas {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
        }
        .camera-controls {
            padding: 1rem;
            display: flex;
            gap: 1rem;
            justify-content: center;
        }
        .btn-cam {
            padding: 0.6rem 1.2rem;
            border-radius: 40px;
            border: none;
            font-weight: 600;
            cursor: pointer;
            transition: 0.2s;
            display: inline-flex;
            align-items: center;
            gap: 8px;
        }
        .btn-start {
            background: #10b981;
            color: white;
        }
        .btn-start:hover {
            background: #059669;
            transform: translateY(-2px);
        }
        .btn-stop {
            background: #ef4444;
            color: white;
        }
        .btn-stop:hover {
            background: #dc2626;
            transform: translateY(-2px);
        }
        .camera-placeholder {
            text-align: center;
            padding: 80px 20px;
            color: #64748b;
        }
        .camera-placeholder i {
            font-size: 4rem;
            margin-bottom: 1rem;
            color: #475569;
        }

        /* Recognition Status */
        .recognition-status {
            background: #1e293b;
            border-radius: 1rem;
            padding: 1rem;
            margin-bottom: 1rem;
        }
        .status-badge {
            display: flex;
            align-items: center;
            gap: 10px;
            padding: 0.8rem;
            border-radius: 1rem;
        }
        .status-detected {
            background: #064e3b;
            border-left: 4px solid #10b981;
        }
        .status-detected i { color: #10b981; }
        .status-not-detected {
            background: #450a0a;
            border-left: 4px solid #ef4444;
        }
        .status-not-detected i { color: #ef4444; }
        .status-loading {
            background: #1e3a5f;
            border-left: 4px solid #3b82f6;
        }
        .status-loading i { color: #3b82f6; }
        .student-info-card {
            background: #0f172a;
            border-radius: 1rem;
            padding: 1rem;
            margin-top: 1rem;
        }
        .student-info-row {
            display: flex;
            justify-content: space-between;
            padding: 0.5rem 0;
            border-bottom: 1px solid #334155;
        }
        .student-info-row span:first-child {
            color: #94a3b8;
            font-size: 0.75rem;
        }
        .student-info-row span:last-child {
            color: white;
            font-weight: 600;
            font-size: 0.85rem;
        }

        /* Attendance Log */
        .attendance-section {
            background: #1e293b;
            border-radius: 1.5rem;
            overflow: hidden;
        }
        .attendance-header {
            background: #0f172a;
            padding: 1rem;
            border-bottom: 1px solid #334155;
        }
        .attendance-header h3 {
            color: white;
            font-size: 1rem;
            display: flex;
            align-items: center;
            gap: 8px;
        }
        .attendance-list {
            max-height: 500px;
            overflow-y: auto;
            padding: 0.5rem;
        }
        .attendance-item {
            background: #0f172a;
            border-radius: 1rem;
            padding: 0.8rem;
            margin-bottom: 0.8rem;
            transition: 0.2s;
        }
        .attendance-item.success {
            border-left: 4px solid #10b981;
        }
        .attendance-item.error {
            border-left: 4px solid #ef4444;
        }
        .attendance-name {
            font-weight: 700;
            color: white;
            font-size: 0.9rem;
        }
        .attendance-detail {
            font-size: 0.7rem;
            color: #94a3b8;
            margin-top: 4px;
        }
        .attendance-time {
            font-size: 0.65rem;
            color: #64748b;
            margin-top: 5px;
            display: flex;
            justify-content: space-between;
            flex-wrap: wrap;
            gap: 5px;
        }
        .badge-success {
            background: #10b981;
            color: white;
            padding: 0.2rem 0.5rem;
            border-radius: 20px;
            font-size: 0.6rem;
        }
        .badge-error {
            background: #ef4444;
            color: white;
            padding: 0.2rem 0.5rem;
            border-radius: 20px;
            font-size: 0.6rem;
        }
        .empty-log {
            text-align: center;
            padding: 2rem;
            color: #64748b;
        }

        @media (max-width: 900px) {
            .main-grid {
                grid-template-columns: 1fr;
            }
        }
    </style>
</head>
<body>
<div class="container">
    <div class="header">
        <div class="logo-area">
            <div class="logo-icon"><i class="fas fa-face-smile"></i></div>
            <div class="logo-text">
                <h1>Face Attendance System</h1>
                <p>Sistem Kehadiran Pengecaman Wajah</p>
            </div>
        </div>
        <a href="index.html" class="logout-btn"><i class="fas fa-sign-out-alt"></i> Log Keluar</a>
    </div>

    <div class="main-grid">
        <!-- Camera Section -->
        <div class="camera-section">
            <div class="camera-header">
                <h3><i class="fas fa-video"></i> Kamera Pengawasan</h3>
                <div class="camera-status" id="cameraStatus">
                    <i class="fas fa-circle" style="font-size: 0.6rem; margin-right: 5px;"></i> Sedia
                </div>
            </div>
            <div class="webcam-wrapper" id="webcamWrapper">
                <div class="camera-placeholder" id="cameraPlaceholder">
                    <i class="fas fa-camera"></i>
                    <p>Kamera belum diaktifkan</p>
                    <button class="btn-cam btn-start" id="startCameraBtn" style="margin-top: 15px;">
                        <i class="fas fa-play"></i> Klik untuk Aktifkan Kamera
                    </button>
                </div>
                <video id="webcam" autoplay playsinline muted style="display: none;"></video>
                <canvas id="canvas" style="display: none;"></canvas>
            </div>
            <div class="camera-controls" id="cameraControls" style="display: none;">
                <button class="btn-cam btn-start" id="restartCameraBtn"><i class="fas fa-play"></i> Start Camera</button>
                <button class="btn-cam btn-stop" id="stopCameraBtn"><i class="fas fa-stop"></i> Stop Camera</button>
            </div>
        </div>

        <!-- Recognition & Attendance -->
        <div class="attendance-section">
            <div class="attendance-header">
                <h3><i class="fas fa-list-alt"></i> Log Kehadiran Hari Ini</h3>
            </div>
            <div class="attendance-list" id="attendanceList">
                <div class="empty-log">
                    <i class="fas fa-info-circle"></i>
                    <p>Tiada rekod kehadiran</p>
                    <p style="font-size: 0.7rem;">Hadapkan muka ke kamera untuk daftar kehadiran</p>
                </div>
            </div>
        </div>
    </div>
</div>

<!-- Face-api.js CDN -->
<script src="https://cdn.jsdelivr.net/npm/face-api.js@0.22.2/dist/face-api.min.js"></script>

<script>
    // DOM Elements
    const video = document.getElementById('webcam');
    const canvas = document.getElementById('canvas');
    const context = canvas.getContext('2d');
    const startBtn = document.getElementById('startCameraBtn');
    const restartBtn = document.getElementById('restartCameraBtn');
    const stopBtn = document.getElementById('stopCameraBtn');
    const cameraStatus = document.getElementById('cameraStatus');
    const cameraPlaceholder = document.getElementById('cameraPlaceholder');
    const cameraControls = document.getElementById('cameraControls');
    const attendanceList = document.getElementById('attendanceList');

    // Variables
    let modelsLoaded = false;
    let isScanning = true;
    let lastScanTime = 0;
    const SCAN_COOLDOWN = 5000; // 5 seconds
    let animationId = null;
    let stream = null;

    // Demo data - Registered faces
    let registeredFaces = [];

    // Load demo data from localStorage
    function loadRegisteredFaces() {
        const saved = localStorage.getItem('registeredFaces');
        if (saved) {
            registeredFaces = JSON.parse(saved);
            console.log(`Loaded ${registeredFaces.length} registered faces`);
        } else {
            // Add demo student for testing
            registeredFaces = [];
            console.log("No registered faces found");
        }
    }

    // Add log to attendance list
    function addAttendanceRecord(name, ic, className, status, message) {
        const now = new Date();
        const dateStr = now.toLocaleDateString('ms-MY');
        const timeStr = now.toLocaleTimeString('ms-MY');
        const dayStr = now.toLocaleDateString('ms-MY', { weekday: 'long' });

        const record = {
            id: Date.now(),
            name,
            ic,
            className,
            status,
            message,
            date: dateStr,
            time: timeStr,
            day: dayStr,
            timestamp: now.getTime()
        };

        let records = JSON.parse(localStorage.getItem('attendance_records') || '[]');
        records.unshift(record);
        records = records.slice(0, 50);
        localStorage.setItem('attendance_records', JSON.stringify(records));

        renderAttendanceList();
    }

    function renderAttendanceList() {
        const records = JSON.parse(localStorage.getItem('attendance_records') || '[]');
        
        if (records.length === 0) {
            attendanceList.innerHTML = `
                <div class="empty-log">
                    <i class="fas fa-info-circle"></i>
                    <p>Tiada rekod kehadiran</p>
                    <p style="font-size: 0.7rem;">Hadapkan muka ke kamera untuk daftar kehadiran</p>
                </div>
            `;
            return;
        }

        attendanceList.innerHTML = records.map(record => `
            <div class="attendance-item ${record.status === 'success' ? 'success' : 'error'}">
                <div class="attendance-name">
                    ${record.status === 'success' ? '✅' : '❌'} ${record.name || 'Pelajar'}
                </div>
                <div class="attendance-detail">
                    IC: ${record.ic || '-'} | Kelas: ${record.className || '-'}
                </div>
                <div class="attendance-time">
                    <span><i class="fas fa-calendar"></i> ${record.date} (${record.day})</span>
                    <span><i class="fas fa-clock"></i> ${record.time}</span>
                    <span class="badge-${record.status}">${record.status === 'success' ? 'BERJAYA' : 'GAGAL'}</span>
                </div>
                <div class="attendance-detail" style="font-size:0.65rem; color:#64748b;">
                    ${record.message}
                </div>
            </div>
        `).join('');
    }

    // Load face-api models
    async function loadModels() {
        cameraStatus.innerHTML = '<i class="fas fa-spinner fa-pulse"></i> Memuatkan model...';
        
        try {
            await faceapi.nets.ssdMobilenetv1.loadFromUri('https://cdn.jsdelivr.net/npm/face-api.js@0.22.2/weights');
            await faceapi.nets.faceLandmark68Net.loadFromUri('https://cdn.jsdelivr.net/npm/face-api.js@0.22.2/weights');
            await faceapi.nets.faceRecognitionNet.loadFromUri('https://cdn.jsdelivr.net/npm/face-api.js@0.22.2/weights');
            
            modelsLoaded = true;
            cameraStatus.innerHTML = '<i class="fas fa-check-circle"></i> Model sedia';
            console.log("Models loaded successfully");
        } catch (error) {
            console.error("Error loading models:", error);
            cameraStatus.innerHTML = '<i class="fas fa-exclamation-triangle"></i> Model gagal dimuat';
        }
    }

    // Start camera with better error handling
    async function startCamera() {
        try {
            // First, stop any existing stream
            if (stream) {
                stream.getTracks().forEach(track => track.stop());
            }
            
            // Request camera with specific constraints
            stream = await navigator.mediaDevices.getUserMedia({
                video: {
                    width: { ideal: 640 },
                    height: { ideal: 480 },
                    facingMode: "user"
                }
            });
            
            video.srcObject = stream;
            video.style.display = "block";
            canvas.style.display = "block";
            cameraPlaceholder.style.display = "none";
            cameraControls.style.display = "flex";
            
            // Wait for video to be ready
            await new Promise((resolve) => {
                video.onloadedmetadata = () => {
                    video.play();
                    resolve();
                };
            });
            
            // Set canvas dimensions
            canvas.width = video.videoWidth;
            canvas.height = video.videoHeight;
            
            cameraStatus.innerHTML = '<i class="fas fa-video"></i> Kamera aktif';
            console.log("Camera started successfully");
            
            // Start detection if models are loaded
            if (modelsLoaded) {
                startDetectionLoop();
            } else {
                // Wait for models to load
                const checkModels = setInterval(() => {
                    if (modelsLoaded) {
                        clearInterval(checkModels);
                        startDetectionLoop();
                    }
                }, 500);
            }
        } catch (error) {
            console.error("Camera error:", error);
            cameraStatus.innerHTML = '<i class="fas fa-exclamation-triangle"></i> Kamera gagal';
            
            if (error.name === 'NotAllowedError') {
                alert("❌ Akses kamera ditolak. Sila benarkan akses kamera dalam penyemak imbas anda.");
            } else if (error.name === 'NotFoundError') {
                alert("❌ Tiada kamera dikesan. Pastikan peranti anda mempunyai kamera.");
            } else {
                alert("❌ Gagal mengakses kamera. Sila cuba lagi.");
            }
        }
    }

    // Stop camera
    function stopCamera() {
        if (stream) {
            stream.getTracks().forEach(track => track.stop());
            stream = null;
        }
        video.srcObject = null;
        video.style.display = "none";
        canvas.style.display = "none";
        cameraPlaceholder.style.display = "flex";
        cameraControls.style.display = "none";
        cameraStatus.innerHTML = '<i class="fas fa-circle"></i> Kamera dihentikan';
        
        if (animationId) {
            cancelAnimationFrame(animationId);
            animationId = null;
        }
        
        // Clear canvas
        if (context) {
            context.clearRect(0, 0, canvas.width, canvas.height);
        }
    }

    // Match face with registered faces
    function matchFace(descriptor) {
        if (!registeredFaces.length) return null;
        
        let bestMatch = null;
        let bestDistance = 0.6;
        
        for (const registered of registeredFaces) {
            const storedDescriptor = new Float32Array(registered.descriptor);
            const distance = faceapi.euclideanDistance(descriptor, storedDescriptor);
            
            if (distance < bestDistance) {
                bestDistance = distance;
                bestMatch = registered;
            }
        }
        
        return bestMatch;
    }

    // Check if student already attended today
    function hasAttendedToday(studentId) {
        const records = JSON.parse(localStorage.getItem('attendance_records') || '[]');
        const today = new Date().toLocaleDateString('ms-MY');
        
        return records.some(record => 
            record.ic === studentId && record.date === today && record.status === 'success'
        );
    }

    // Detection loop
    async function startDetectionLoop() {
        if (!modelsLoaded || !video.srcObject || video.paused) {
            animationId = requestAnimationFrame(() => startDetectionLoop());
            return;
        }
        
        const displaySize = { width: video.videoWidth, height: video.videoHeight };
        
        if (displaySize.width === 0 || displaySize.height === 0) {
            animationId = requestAnimationFrame(() => startDetectionLoop());
            return;
        }
        
        faceapi.matchDimensions(canvas, displaySize);
        
        async function detect() {
            if (!video.srcObject || video.paused || video.ended) {
                animationId = requestAnimationFrame(detect);
                return;
            }
            
            try {
                const detections = await faceapi.detectAllFaces(video)
                    .withFaceLandmarks()
                    .withFaceDescriptors();
                
                const resizedDetections = faceapi.resizeResults(detections, displaySize);
                
                // Clear and draw
                context.clearRect(0, 0, canvas.width, canvas.height);
                faceapi.draw.drawDetections(canvas, resizedDetections);
                faceapi.draw.drawFaceLandmarks(canvas, resizedDetections);
                
                // Check for face matching
                if (detections.length > 0 && registeredFaces.length > 0) {
                    const currentDescriptor = detections[0].descriptor;
                    const match = matchFace(currentDescriptor);
                    const now = Date.now();
                    
                    if (match && (now - lastScanTime) > SCAN_COOLDOWN) {
                        lastScanTime = now;
                        
                        if (hasAttendedToday(match.ic)) {
                            addAttendanceRecord(
                                match.name,
                                match.ic,
                                match.className || '-',
                                'error',
                                'Kehadiran sudah direkodkan untuk hari ini'
                            );
                        } else {
                            addAttendanceRecord(
                                match.name,
                                match.ic,
                                match.className || '-',
                                'success',
                                'Kehadiran berjaya direkodkan'
                            );
                            
                            // Flash green box effect
                            if (resizedDetections[0]) {
                                const box = resizedDetections[0].detection.box;
                                context.strokeStyle = '#10b981';
                                context.lineWidth = 4;
                                context.strokeRect(box.x, box.y, box.width, box.height);
                                
                                // Draw name
                                context.fillStyle = '#10b981';
                                context.font = 'bold 16px "Plus Jakarta Sans"';
                                context.fillText(`${match.name} - Dihadiri`, box.x, box.y - 10);
                            }
                        }
                    }
                    
                    if (match && resizedDetections[0]) {
                        const box = resizedDetections[0].detection.box;
                        context.fillStyle = '#10b981';
                        context.font = 'bold 16px "Plus Jakarta Sans"';
                        context.fillText(`${match.name}`, box.x, box.y - 10);
                    }
                } else if (detections.length > 0 && registeredFaces.length === 0) {
                    // Face detected but no registration
                    const box = resizedDetections[0].detection.box;
                    context.fillStyle = '#f59e0b';
                    context.font = '14px "Plus Jakarta Sans"';
                    context.fillText('Wajah tidak dikenali. Sila daftar.', box.x, box.y - 10);
                }
            } catch (e) {
                console.error("Detection error:", e);
            }
            
            animationId = requestAnimationFrame(detect);
        }
        
        detect();
    }

    // Event listeners
    startBtn?.addEventListener('click', startCamera);
    restartBtn?.addEventListener('click', startCamera);
    stopBtn?.addEventListener('click', stopCamera);

    // Initialize
    loadModels();
    loadRegisteredFaces();
    renderAttendanceList();

    // Auto-start camera when page loads (optional)
    // Uncomment below to auto-start
    // setTimeout(() => {
    //     if (modelsLoaded) {
    //         startCamera();
    //     }
    // }, 1000);
</script>
</body>
</html>
